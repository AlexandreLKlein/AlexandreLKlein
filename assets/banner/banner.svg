<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Alexandre Leuckert Klein — Senior Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <ellipse cx="980" cy="160" rx="380" ry="220" fill="url(#glow)"/>

  <!-- Decorative circuit traces -->
  <g stroke="#1f6feb" stroke-width="1.2" fill="none" opacity="0.55">
    <path d="M 60 60 L 200 60 L 220 80 L 360 80"/>
    <circle cx="60" cy="60" r="3" fill="#58a6ff"/>
    <circle cx="360" cy="80" r="3" fill="#58a6ff"/>

    <path d="M 60 260 L 180 260 L 200 240 L 320 240"/>
    <circle cx="60" cy="260" r="3" fill="#7ee787"/>
    <circle cx="320" cy="240" r="3" fill="#7ee787"/>

    <path d="M 920 50 L 1060 50 L 1080 70 L 1220 70"/>
    <circle cx="920" cy="50" r="3" fill="#7ee787"/>
    <circle cx="1220" cy="70" r="3" fill="#7ee787"/>

    <path d="M 900 270 L 1040 270 L 1060 250 L 1220 250"/>
    <circle cx="900" cy="270" r="3" fill="#58a6ff"/>
    <circle cx="1220" cy="250" r="3" fill="#58a6ff"/>
  </g>

  <!-- Vertical accent line -->
  <rect x="60" y="110" width="4" height="100" fill="url(#accent)"/>

  <!-- Name -->
  <text x="84" y="160" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="46" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    Alexandre Leuckert Klein
  </text>

  <!-- Role / tagline -->
  <text x="84" y="200" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="#58a6ff">
    Senior Software Engineer
  </text>

  <!-- Sub-tagline -->
  <text x="84" y="232" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#8b949e">
    Embedded &amp; IoT Systems  ·  Real-Time C++  ·  Full-Stack Product  ·  Technical Leadership
  </text>

  <!-- Location pill -->
  <g transform="translate(84, 254)">
    <rect width="146" height="26" rx="13" fill="#0d1117" stroke="#30363d"/>
    <circle cx="14" cy="13" r="4" fill="#7ee787"/>
    <text x="26" y="18" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#c9d1d9">
      Novo Hamburgo, Brazil
    </text>
  </g>

  <!-- Stack of tech chips on the right -->
  <g transform="translate(800, 130)" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="13" font-weight="600">
    <g>
      <rect x="0" y="0" width="84" height="28" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb"/>
      <text x="42" y="19" text-anchor="middle" fill="#79c0ff">C++</text>
    </g>
    <g transform="translate(96,0)">
      <rect x="0" y="0" width="68" height="28" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb"/>
      <text x="34" y="19" text-anchor="middle" fill="#79c0ff">C</text>
    </g>
    <g transform="translate(176,0)">
      <rect x="0" y="0" width="92" height="28" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb"/>
      <text x="46" y="19" text-anchor="middle" fill="#79c0ff">Laravel</text>
    </g>
    <g transform="translate(280,0)">
      <rect x="0" y="0" width="118" height="28" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb"/>
      <text x="59" y="19" text-anchor="middle" fill="#79c0ff">Unreal Engine</text>
    </g>

    <g transform="translate(0,40)">
      <rect x="0" y="0" width="100" height="28" rx="6" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="50" y="19" text-anchor="middle" fill="#7ee787">Firmware</text>
    </g>
    <g transform="translate(112,40)">
      <rect x="0" y="0" width="98" height="28" rx="6" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="49" y="19" text-anchor="middle" fill="#7ee787">Azure</text>
    </g>
    <g transform="translate(222,40)">
      <rect x="0" y="0" width="84" height="28" rx="6" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="42" y="19" text-anchor="middle" fill="#7ee787">RTOS</text>
    </g>
    <g transform="translate(318,40)">
      <rect x="0" y="0" width="80" height="28" rx="6" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="40" y="19" text-anchor="middle" fill="#7ee787">IoT</text>
    </g>

    <g transform="translate(0,80)">
      <rect x="0" y="0" width="96" height="28" rx="6" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="48" y="19" text-anchor="middle" fill="#ffa657">TypeScript</text>
    </g>
    <g transform="translate(108,80)">
      <rect x="0" y="0" width="104" height="28" rx="6" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="52" y="19" text-anchor="middle" fill="#ffa657">Vue.js</text>
    </g>
    <g transform="translate(224,80)">
      <rect x="0" y="0" width="90" height="28" rx="6" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="45" y="19" text-anchor="middle" fill="#ffa657">CMake</text>
    </g>
    <g transform="translate(326,80)">
      <rect x="0" y="0" width="72" height="28" rx="6" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="36" y="19" text-anchor="middle" fill="#ffa657">CI/CD</text>
    </g>
  </g>
</svg>
