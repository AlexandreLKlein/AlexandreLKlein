<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="FishTV Championship and Events Platform">
  <defs>
    <linearGradient id="fish-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#fish-bg)" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#a371f7"/>

  <text x="20" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">ERP · CRM · Events Platform</text>
  <text x="20" y="60" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e">FishTV · 09/2018 — 08/2021</text>

  <text x="20" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a371f7">SOFTWARE DEVELOPER · BRAZIL</text>

  <text x="20" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c9d1d9">
    <tspan x="20" dy="0">ERP, CRM, and championship/event</tspan>
    <tspan x="20" dy="16">management software. REST APIs and</tspan>
    <tspan x="20" dy="16">backend services, full lifecycle.</tspan>
  </text>

  <g transform="translate(20, 192)" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">
    <rect width="32" height="18" rx="3" fill="#a371f7" fill-opacity="0.12" stroke="#a371f7"/>
    <text x="16" y="13" text-anchor="middle" fill="#d2a8ff">C#</text>
    <g transform="translate(38,0)">
      <rect width="58" height="18" rx="3" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="29" y="13" text-anchor="middle" fill="#ffa657">Laravel</text>
    </g>
    <g transform="translate(102,0)">
      <rect width="76" height="18" rx="3" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="38" y="13" text-anchor="middle" fill="#ffa657">JavaScript</text>
    </g>
    <g transform="translate(184,0)">
      <rect width="60" height="18" rx="3" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="30" y="13" text-anchor="middle" fill="#7ee787">REST</text>
    </g>
  </g>
