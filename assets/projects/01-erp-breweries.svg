<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="ERP, CRM & POS for Breweries and Pubs">
  <defs>
    <linearGradient id="erp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#erp-bg)" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#f0883e"/>

  <text x="20" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">ERP · CRM · POS</text>
  <text x="20" y="60" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e">Breweries &amp; Pubs Platform</text>

  <text x="20" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0883e">SIDE PROJECT · 03/2024 — PRESENT</text>

  <text x="20" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c9d1d9">
    <tspan x="20" dy="0">Integrated platform covering inventory,</tspan>
    <tspan x="20" dy="16">loyalty, production, fiscal compliance,</tspan>
    <tspan x="20" dy="16">payments, and IoT brewing.</tspan>
  </text>

  <g transform="translate(20, 192)" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">
    <rect width="58" height="18" rx="3" fill="#f0883e" fill-opacity="0.15" stroke="#f0883e"/>
    <text x="29" y="13" text-anchor="middle" fill="#ffa657">Laravel</text>
    <g transform="translate(64,0)">
      <rect width="48" height="18" rx="3" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="24" y="13" text-anchor="middle" fill="#7ee787">Vue.js</text>
    </g>
    <g transform="translate(118,0)">
      <rect width="60" height="18" rx="3" fill="#58a6ff" fill-opacity="0.12" stroke="#58a6ff"/>
      <text x="30" y="13" text-anchor="middle" fill="#79c0ff">Vuetify</text>
    </g>
    <g transform="translate(184,0)">
      <rect width="40" height="18" rx="3" fill="#f0883e" fill-opacity="0.12" stroke="#f0883e"/>
      <text x="20" y="13" text-anchor="middle" fill="#ffa657">IoT</text>
    </g>
  </g>
</svg>
