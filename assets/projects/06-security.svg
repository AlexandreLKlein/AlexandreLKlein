<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="Offensive Security &amp; Cyber Intelligence Foundations">
  <defs>
    <linearGradient id="sec-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#sec-bg)" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#f85149"/>

  <text x="20" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">Security &amp; Cyber Intelligence</text>
  <text x="20" y="60" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e">Foundations in offensive security</text>

  <text x="20" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f85149">FOUNDATIONS</text>

  <text x="20" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c9d1d9">
    <tspan x="20" dy="0">Secure software practices, threat</tspan>
    <tspan x="20" dy="16">awareness, and offensive security</tspan>
    <tspan x="20" dy="16">fundamentals applied to product work.</tspan>
  </text>

  <g transform="translate(20, 192)" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">
    <rect width="64" height="18" rx="3" fill="#f85149" fill-opacity="0.12" stroke="#f85149"/>
    <text x="32" y="13" text-anchor="middle" fill="#ff7b72">OffSec</text>
    <g transform="translate(70,0)">
      <rect width="80" height="18" rx="3" fill="#f85149" fill-opacity="0.12" stroke="#f85149"/>
      <text x="40" y="13" text-anchor="middle" fill="#ff7b72">Cyber Intel</text>
    </g>
    <g transform="translate(156,0)">
      <rect width="78" height="18" rx="3" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="39" y="13" text-anchor="middle" fill="#7ee787">Endpoint</text>
    </g>
  </g>
</svg>
