<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="Cross-Platform Software Leadership">
  <defs>
    <linearGradient id="cross-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#cross-bg)" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="4" rx="2" fill="#58a6ff"/>

  <text x="20" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f0f6fc">Cross-Platform Software</text>
  <text x="20" y="60" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8b949e">Secure production systems</text>

  <text x="20" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff">LEADERSHIP HIGHLIGHT</text>

  <text x="20" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#c9d1d9">
    <tspan x="20" dy="0">Led a team to deliver secure cross-</tspan>
    <tspan x="20" dy="16">platform software, improving production</tspan>
    <tspan x="20" dy="16">efficiency by 30%.</tspan>
  </text>

  <g transform="translate(20, 192)" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">
    <rect width="78" height="18" rx="3" fill="#58a6ff" fill-opacity="0.12" stroke="#58a6ff"/>
    <text x="39" y="13" text-anchor="middle" fill="#79c0ff">Leadership</text>
    <g transform="translate(84,0)">
      <rect width="74" height="18" rx="3" fill="#7ee787" fill-opacity="0.12" stroke="#7ee787"/>
      <text x="37" y="13" text-anchor="middle" fill="#7ee787">Security</text>
    </g>
    <g transform="translate(164,0)">
      <rect width="78" height="18" rx="3" fill="#a371f7" fill-opacity="0.12" stroke="#a371f7"/>
      <text x="39" y="13" text-anchor="middle" fill="#d2a8ff">30% Faster</text>
    </g>
  </g>
</svg>
