name: Update GitHub Stats

on:
  # Run weekly to keep stats fresh
  schedule:
    - cron: "0 6 * * 1"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the workflow file itself changes
  push:
    paths:
      - ".github/workflows/stats.yml"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_rank=false&bg_color=0D1117&title_color=58A6FF&text_color=c9d1d9&icon_color=7ee787
          path: assets/stats/profile.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&bg_color=0D1117&title_color=58A6FF&text_color=c9d1d9
          path: assets/stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated assets
        run: |
          if [ -d "assets/stats" ]; then
            echo "Generated stats:"
            ls -la assets/stats/
          else
            echo "::error::assets/stats directory was not created"
            exit 1
          fi

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats/
          if git diff --staged --quiet; then
            echo "No stats changes to commit."
          else
            git commit -m "chore: update GitHub stats SVGs"
            git push
          fi
